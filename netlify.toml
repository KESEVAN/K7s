[build]
  command   = "npm run build"
  publish   = "dist"

[[redirects]]
  from = "/goals"
  to   = "/goals.html"
  status = 200

[[redirects]]
  from = "/works"
  to   = "/works.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"
